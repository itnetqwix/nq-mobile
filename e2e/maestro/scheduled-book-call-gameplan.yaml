# Scheduled lesson: book → trainer confirm → join → game plan (smoke)
# Requires: staging API, trainee login, trainer on second device for confirm/join.
appId: ${APP_ID}
env:
  TRAINEE_EMAIL: ${TRAINEE_EMAIL}
  TRAINEE_PASSWORD: ${TRAINEE_PASSWORD}
---
- launchApp
- runFlow:
    when:
      visible: "Sign in"
    commands:
      - tapOn: "Email"
      - inputText: ${TRAINEE_EMAIL}
      - tapOn: "Password"
      - inputText: ${TRAINEE_PASSWORD}
      - tapOn: "Sign in"
- extendedWaitUntil:
    visible: "Book Expert"
    timeout: 60000
- tapOn: "Book Expert"
- tapOn:
    text: "Schedule"
    optional: true
- tapOn:
    text: ".*"
    index: 0
    optional: true
- assertVisible:
    text: ".*"
    optional: true
- back
- tapOn:
    text: "Upcoming"
    optional: true
- assertVisible:
    text: ".*session.*"
    optional: true
# In-call steps (trainer device): join → screenshot → game plan — run manually or extend with testIDs.
