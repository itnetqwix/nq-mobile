# Scheduled lesson: full wizard smoke, then optional Upcoming check.
# Post-booking call + game plan still needs a second device (trainer confirm/join).
appId: ${APP_ID}
env:
  TRAINEE_EMAIL: ${TRAINEE_EMAIL}
  TRAINEE_PASSWORD: ${TRAINEE_PASSWORD}
---
- launchApp
- runFlow:
    file: flows/login-trainee.yaml
    env:
      TRAINEE_EMAIL: ${TRAINEE_EMAIL}
      TRAINEE_PASSWORD: ${TRAINEE_PASSWORD}
- runFlow:
    file: flows/scheduled-booking-wizard-steps.yaml
- tapOn:
    text: "Upcoming"
    optional: true
- assertVisible:
    text: ".*pending.*|.*requested.*|.*session.*"
    optional: true
# Trainer device: confirm booking → join call → game plan — extend when trainer testIDs exist.
